<!DOCTYPE html>
<html lang="en">
    <head>
        <script type="text/javascript">
            if (!navigator.userAgentData?.mobile && !/Mobi|Android/i.test(navigator.userAgent)) {
                window.location.href = "index.html";
            }
        </script>
        <meta charset="UTF-8">
        <meta http-equiv="Cache-Control" content="no-cache">
        <title>Kander's Forsaken levels - Mobile Edition</title>
        <link rel="stylesheet" type="text/css" href="style_mobile.css">
        <link rel="icon" type="image/x-icon" href="assets/TTIcon.png">
    </head>
    <body>
        <header>
            <h1>My</h1>
            <section id="logo">
                <img src="assets/ForsakenLogo.png" alt="Forsaken Logo Here">
            </section>
            <h1>Levels and Stats</h1>
        </header>
        <section id="TheCenter">
                <aside>
                   <section id="stats" class="borderclass"></section>
                    <section id="gamepasses" class="borderclass"></section>
                </aside>
            <main class="borderclass">
                <h2>My Levels</h2>
                <div>
                    <button id="KilBut" onclick="toggle('K')">Killers</button>
                    <button id="SurBut" onclick="toggle('S')">Survivors</button>
                </div>
                <div class="white_line"></div>
                <section id="killers"></section>
                <section id="survivors"></section>
                <script>
                    function toggle(option) {
                        const SK = document.getElementById("killers");
                        const KB = document.getElementById("KilBut");
                        const SS = document.getElementById("survivors");
                        const SB = document.getElementById("SurBut");
                        if (option === 'K') {
                            SK.style.display = "grid";
                            SS.style.display = "none";
                            KB.style.backgroundColor = "rgb(206, 206, 206)";
                            KB.style.color = "black";
                            SB.style.backgroundColor = "black";
                            SB.style.color = "white";
                        } else if (option === 'S') {
                            SK.style.display = "none";
                            SS.style.display = "grid";
                            SB.style.backgroundColor = "rgb(206, 206, 206)";
                            SB.style.color = "black";
                            KB.style.backgroundColor = "black";
                            KB.style.color = "white";
                        }
                    }
                </script>
            </main>
        </section>
        <footer>
            <p>(Mobile Version) Last updated: <span id="edit_date"></span> CET</p>
            <p>(Renders and Forsaken title are made by the Forsaken Team)</p>
        </footer>
        <script>
            const lastEdit = new Date(document.lastModified);
            document.getElementById("edit_date").innerText = lastEdit.toLocaleString();
        </script>
        <script src="load_stats.js"></script>
    </body>
</html>
